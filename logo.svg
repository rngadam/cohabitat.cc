<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#F3F4F1" />
  
  <!-- Wheels -->
  <circle cx="140" cy="340" r="85" stroke="#1A472A" stroke-width="18" fill="none"/>
  <circle cx="372" cy="340" r="85" stroke="#1A472A" stroke-width="18" fill="none"/>
  
  <!-- Hubs -->
  <circle cx="140" cy="340" r="10" fill="#1A472A"/>
  <circle cx="372" cy="340" r="10" fill="#1A472A"/>

  <!-- Frame & House Structure -->
