  <path d="M 215 135 L 325 80 L 325 160" stroke="#1A472A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Windows -->
  <rect x="250" y="140" width="18" height="18" fill="#1A472A"/>
  <rect x="275" y="140" width="18" height="18" fill="#1A472A"/>
  <rect x="250" y="165" width="18" height="18" fill="#1A472A"/>
  <rect x="275" y="165" width="18" height="18" fill="#1A472A"/>

