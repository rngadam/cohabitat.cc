  <path d="M 205 210 L 195 180" stroke="#1A472A" stroke-width="14" stroke-linecap="round"/>
  <path d="M 160 175 Q 160 165 200 165 L 230 165 Q 240 165 240 175 L 160 175 Z" fill="#1A472A"/>

  <!-- Handlebars -->
  <path d="M 315 210 L 335 160 L 375 160 Q 405 160 405 190 Q 405 210 385 210" stroke="#1A472A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

