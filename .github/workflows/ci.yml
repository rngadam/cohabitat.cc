name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Linting
        run: npm run lint

      - name: Validate Allocations
        run: npm run validate:allocations

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      - name: Run Playwright tests (E2E)
        run: npm test

      - name: Generate Verification Screenshot
        run: |
          npm run dev &
          # Wait for server to be ready
          npx wait-on http://localhost:8080/index.html -t 30000
          node screenshots/verify_changes.js

      - name: Archive Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            screenshots/
            playwright-report/
            test-results/
