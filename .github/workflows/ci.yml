name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Lint & Test (Nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cache
        uses: cachix/cachix-action@v15
        with:
          name: modern-resume-env
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # Fallback to public cache if no token
          skipPush: ${{ secrets.CACHIX_AUTH_TOKEN == '' }}

      - name: Lint & Link Check
        run: nix develop --command bash -c "npm install && npx htmlhint '**/*.html' && npx stylelint '**/*.css' && npx eslint '**/*.js' && npx linkinator . --recurse --skip '^mailto:|example\.com|facebook\.com|linkedin\.com'"

      - name: Run Playwright tests
        run: nix develop --command bash -c "npx playwright install --with-deps && npm test"

      - name: Generate Verification Screenshot
        run: |
          nix develop --command bash -c "npm run dev & sleep 5 && node screenshots/verify_changes.js"

      - name: Archive Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            screenshots/
            playwright-report/
            test-results/
